  <style>
    /* PARKET DESIGN SYSTEM — tokens */
    :root {
      --preto: #000000;
      --branco: #ffffff;
      --madeira: #c0bda6;
      --font-display: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --text-display: 72px; --text-h1: 56px; --text-h2: 42px; --text-h3: 32px; --text-h4: 24px;
      --text-body-lg: 20px; --text-body: 18px; --text-small: 16px; --text-caption: 14px;
      --ease: cubic-bezier(.22,.61,.36,1);
      --dur: 0.6s;
      --dur-btn: 0.35s;
      --container: 1400px;
    }

    body {
      background-color: var(--preto);
      color: var(--branco);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    /* ── Collection Section ── */
    .piso-section {
      padding: 7rem 3rem;
      max-width: 90rem;
      margin: 0 auto;
    }

    .piso-header {
      margin-bottom: 3rem;
    }

    /* ── Carousel ── */
    .carousel-viewport {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 55vh;
      max-height: 560px;
      overflow: hidden;
      margin: 0 auto;
    }

    .carousel-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      transition: opacity 0.8s var(--ease), transform 0.8s var(--ease);
      transform: scale(1.04);
    }

    .carousel-slide.active {
      opacity: 1;
      transform: scale(1);
      z-index: 1;
    }

    .slide-inner {
      position: relative;
      max-width: 100%;
      max-height: 100%;
      line-height: 0;
      cursor: zoom-in;
    }

    .slide-inner img {
      display: block;
      width: 100%;
      max-width: 900px;
      height: 55vh;
      max-height: 560px;
      object-fit: cover;
      object-position: center bottom;
    }

    /* Zoom específico para focar somente no piso */
    .slide-inner img[src*="pisos/unicos/03"] {
      transform: scale(1.5);
      transform-origin: center bottom;
    }

    .slide-caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 32px 56px 28px;
      color: rgba(255, 255, 255, 0.92);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      text-align: left;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.65) 0%, rgba(0, 0, 0, 0) 100%);
      pointer-events: none;
      z-index: 2;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      line-height: 1.4;
    }

    @media (max-width: 640px) {
      .slide-caption {
        padding: 24px 28px 20px;
        font-size: 11px;
        letter-spacing: 0.24em;
      }
    }

    /* ── Thumbnails ── */
    .thumb-track {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding: 4px 0;
      justify-content: safe center;
    }

    .thumb-track::-webkit-scrollbar {
      display: none;
    }

    .thumb {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      overflow: hidden;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      opacity: 0.4;
      transition: opacity 0.4s ease, border-color 0.4s ease, transform 0.3s ease;
    }

    .thumb:hover {
      opacity: 0.7;
      transform: scale(1.08);
    }

    .thumb.active {
      opacity: 1;
      border-color: rgba(255, 255, 255, 0.7);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Progress bar ── */
    .progress-bar {
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: rgba(255, 255, 255, 0.6);
      transition: width 0.3s ease;
    }

    /* ── Fade-up entry ── */
    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Video section ── */
    .video-section {
      margin-top: 6rem;
      padding-top: 4rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .video-section-header {
      text-align: left;
      margin-bottom: 2.5rem;
    }

    .video-section-eyebrow {
      display: block;
      font-size: 10px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      margin-bottom: 1rem;
    }

    .video-section-title {
      font-size: clamp(1.75rem, 3vw, 2.5rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1;
    }

    /* ── YouTube lite (fachada que vira iframe ao clicar) ── */
    .video-block {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      position: relative;
      cursor: pointer;
      background: #000;
      overflow: hidden;
    }

    .video-block.vertical {
      max-width: 300px;
      aspect-ratio: 9 / 16;
    }

    .video-block img.video-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      transition: opacity 0.3s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .video-block:hover img.video-poster {
      opacity: 1;
      transform: scale(1.02);
    }

    .video-block .video-play {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 78px;
      height: 54px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .video-block:hover .video-play {
      background: #cc0000;
      transform: translate(-50%, -50%) scale(1.05);
    }

    .video-block .video-play::before {
      content: '';
      border-style: solid;
      border-width: 11px 0 11px 18px;
      border-color: transparent transparent transparent #fff;
      margin-left: 4px;
    }

    .video-block iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* ── Divider between sections ── */
    .section-divider {
      max-width: 90rem;
      margin: 0 auto;
      padding: 0 3rem;
    }

    .section-divider>div {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.12), transparent);
    }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #lightbox.active {
      display: flex;
      opacity: 1;
    }

    #lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: scale(0.95);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #lightbox.active #lightbox-img {
      transform: scale(1);
    }

    .lb-btn {
      position: absolute;
      z-index: 110;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: all 0.3s ease;
    }

    .lb-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.1);
    }

    .lb-close {
      top: 40px;
      right: 40px;
    }

    .lb-prev {
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
    }

    .lb-next {
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
    }
  </style>

</head>

              "https://parket.com.br/wp-content/uploads/2025/10/PRO_PI_MA-11.jpg"
            ]
          }
        ];

        // Single-collection filter: when window.PISO_COLLECTION is set, render
        // only that collection (used to split Pisos into one site per coleção).
        const COLLECTIONS_VIEW = (typeof window !== 'undefined' && window.PISO_COLLECTION)
          ? COLLECTIONS.filter(c => c.key === window.PISO_COLLECTION)
          : COLLECTIONS;

        function probe(src) {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(src);
            img.onerror = () => reject();
            img.src = src;
          });
        }

        async function findLocalImages(folder) {
          const found = [];
          let consecutiveMisses = 0;
          for (let i = 1; i <= MAX_LOCAL_IMAGES; i++) {
            const num = String(i).padStart(2, '0');
            let hit = false;
            for (const ext of EXTS) {
              try {
                const src = await probe(`${folder}/${num}.${ext}`);
                found.push(src);
                hit = true;
                break;
              } catch { }
            }
            if (!hit) {
              consecutiveMisses++;
              if (consecutiveMisses >= 3) break;
            } else {
              consecutiveMisses = 0;
            }
          }
          return found;
        }

        // ── Lightbox (shared across all carousels) ──
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        let lbImages = [];
        let lbIndex = 0;

        window.openLightbox = (images, idx) => {
          lbImages = images;
          lbIndex = idx;
          lbImg.src = lbImages[lbIndex];
          lb.classList.add('active');
          document.body.style.overflow = 'hidden';
        };
        window.closeLightbox = () => {
          lb.classList.remove('active');
          document.body.style.overflow = 'auto';
        };
        window.lbNext = () => {
          lbIndex = (lbIndex + 1) % lbImages.length;
          lbImg.src = lbImages[lbIndex];
        };
        window.lbPrev = () => {
          lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length;
          lbImg.src = lbImages[lbIndex];
        };
        document.addEventListener('keydown', (e) => {
          if (!lb.classList.contains('active')) return;
          if (e.key === 'Escape') { closeLightbox(); e.stopImmediatePropagation(); }
          if (e.key === 'ArrowRight') { lbNext(); e.stopImmediatePropagation(); }
          if (e.key === 'ArrowLeft') { lbPrev(); e.stopImmediatePropagation(); }
        });

        function buildSection(col, images) {
          const section = document.createElement('section');
          section.className = 'piso-section';
          section.id = col.key;
          section.innerHTML = `
          <div class="piso-header fade-up">
            <span class="font-label uppercase tracking-[0.5em] text-[10px] text-white/30 mb-6 block">Coleção</span>
            <h2 class="text-[29.28px] font-extralight tracking-[-0.04em] leading-[0.85] mb-8">${col.titleHtml || col.title}</h2>
            ${col.desc ? `<p class="text-white/40 text-lg font-light leading-relaxed max-w-2xl">${col.desc}</p>` : ''}
          </div>
          <div class="fade-up" style="transition-delay: 0.15s">
            <div class="carousel-viewport"></div>
            <div class="max-w-[900px] mx-auto">
              <div class="flex items-center gap-6 mt-6">
                <div class="progress-bar flex-1"><div class="progress-fill"></div></div>
              </div>
              <div class="thumb-track mt-6 justify-center"></div>
            </div>
          </div>
          ${col.youtube ? `
          <div class="fade-up video-section" style="transition-delay: 0.25s">
            <div class="video-section-header">
              <span class="video-section-eyebrow">Em movimento</span>
              <h3 class="video-section-title">Vídeos</h3>
            </div>
            <div class="video-block${col.youtubeShort ? ' vertical' : ''}" data-yt="${col.youtube}" role="button" aria-label="Reproduzir vídeo">
              <img class="video-poster" loading="lazy" decoding="async" src="${col.videoPoster || `https://i.ytimg.com/vi/${col.youtube}/${col.youtubeShort ? 'maxresdefault' : 'hqdefault'}.jpg`}" alt="Vídeo ${col.title}">
              <div class="video-play" aria-hidden="true"></div>
            </div>
          </div>` : ''}
        `;
          initCarousel(section, images, col.title, col.names || {});
          if (col.youtube) initLiteYouTube(section);
          return section;
        }

        function initLiteYouTube(section) {
          const block = section.querySelector('.video-block');
          if (!block) return;
          block.addEventListener('click', () => {
            const id = block.dataset.yt;
            if (!id) return;
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
            iframe.title = 'Vídeo';
            iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
            iframe.allowFullscreen = true;
            block.replaceChildren(iframe);
          }, { once: true });
        }

        const carousels = [];

        function initCarousel(section, images, title, names) {
          const viewport = section.querySelector('.carousel-viewport');
          const thumbTrack = section.querySelector('.thumb-track');
          const progressFill = section.querySelector('.progress-fill');

          let current = 0;
          let timer = null;

          images.forEach((src, i) => {
            const name = names[i + 1];
            const altLabel = name || `${title} ${i + 1}`;
            const slide = document.createElement('div');
            slide.className = 'carousel-slide' + (i === 0 ? ' active' : '');
            slide.innerHTML = `
              <div class="slide-inner">
                <img decoding="async" src="${src}" alt="${altLabel}" loading="lazy">
                ${name ? `<div class="slide-caption">${name}</div>` : ''}
              </div>
            `;
            slide.addEventListener('click', () => openLightbox(images, i));
            viewport.appendChild(slide);

            const thumb = document.createElement('div');
            thumb.className = 'thumb' + (i === 0 ? ' active' : '');
            thumb.innerHTML = `<img decoding="async" src="${src}" alt="Thumb ${i + 1}" loading="lazy">`;
            thumb.addEventListener('click', () => goTo(i));
            thumbTrack.appendChild(thumb);
          });

          function goTo(idx) {
            if (idx < 0) idx = images.length - 1;
            if (idx >= images.length) idx = 0;
            current = idx;
            viewport.querySelectorAll('.carousel-slide').forEach((s, i) => {
              s.classList.toggle('active', i === current);
            });
            thumbTrack.querySelectorAll('.thumb').forEach((t, i) => {
              t.classList.toggle('active', i === current);
              if (i === current) { const tr = thumbTrack.getBoundingClientRect(), rr = t.getBoundingClientRect(); thumbTrack.scrollTo({ left: thumbTrack.scrollLeft + (rr.left - tr.left) - thumbTrack.clientWidth / 2 + rr.width / 2, behavior: 'smooth' }); }
            });
            progressFill.style.width = `${((current + 1) / images.length) * 100}%`;
            restart();
          }
          const next = () => goTo(current + 1);
          const prev = () => goTo(current - 1);

          function start() {
            if (timer) return;
            timer = setInterval(next, 5500);
          }
          function stop() {
            if (!timer) return;
            clearInterval(timer);
            timer = null;
          }
          function restart() { stop(); start(); }

          viewport.addEventListener('mouseenter', stop);
          viewport.addEventListener('mouseleave', start);

          let touchStartX = 0;
          viewport.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
          viewport.addEventListener('touchend', (e) => {
            const diff = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) diff > 0 ? next() : prev();
          }, { passive: true });

          progressFill.style.width = `${(1 / images.length) * 100}%`;

          // Autoplay only when in view
          const io = new IntersectionObserver((entries) => {
            entries.forEach(e => e.isIntersecting ? start() : stop());
          }, { threshold: 0.25 });
          io.observe(section);

          carousels.push({ section, next, prev });
        }

        // ── Setas do teclado: navega o carrossel mais visível na tela ──
        document.addEventListener('keydown', (e) => {
          if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
          if (lb.classList.contains('active')) return; // lightbox tem suas próprias setas
          const tag = (e.target.tagName || '').toLowerCase();
          if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;

          const center = window.innerHeight / 2;
          let best = null;
          let bestDist = Infinity;
          for (const c of carousels) {
            const r = c.section.getBoundingClientRect();
            if (r.bottom < 0 || r.top > window.innerHeight) continue;
            const sectionCenter = r.top + r.height / 2;
            const dist = Math.abs(sectionCenter - center);
            if (dist < bestDist) { bestDist = dist; best = c; }
          }
          if (!best) return;
          e.preventDefault();
          e.key === 'ArrowRight' ? best.next() : best.prev();
        });

        async function init() {
          const container = document.getElementById('collections');
          for (let i = 0; i < COLLECTIONS_VIEW.length; i++) {
            const col = COLLECTIONS_VIEW[i];
            let images = [];
            if (col.remote && col.remote.length) {
              images = col.remote;
            } else if (col.localFolder) {
              images = await findLocalImages(col.localFolder);
            }
            if (!images.length) continue;

            container.appendChild(buildSection(col, images));

            if (i < COLLECTIONS_VIEW.length - 1) {
              const div = document.createElement('div');
              div.className = 'section-divider';
              div.innerHTML = '<div></div>';
              container.appendChild(div);
            }
          }

          // Fade-up observer
          const io = new IntersectionObserver((entries) => {
            entries.forEach(e => {
              if (e.isIntersecting) e.target.classList.add('visible');
            });
          }, { threshold: 0.1 });
          document.querySelectorAll('.fade-up').forEach(el => io.observe(el));
        }

        window.addEventListener('load', init);
      })();
  </script>
</body>

</html>
